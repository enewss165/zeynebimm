<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Çok Seviyorum ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Arka plan fotoğraf - AŞAĞI KAYDIRILDI */
        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('foto.jpg');
            background-size: cover;
            /* Fotoğrafı aşağı kaydır - yüz yerine göğüs kısmı görünsün */
            background-position: center 70%;
            background-repeat: no-repeat;
            z-index: -2;
        }

        /* Hafif koyu overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            z-index: -1;
        }

        /* Ana içerik */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* Başlık - ortada ama fotoğraf aşağıda olduğu için çakışmaz */
        h1 {
            font-size: 4rem;
            color: #fff;
            text-shadow: 
                4px 4px 8px rgba(0,0,0,0.9),
                0 0 30px rgba(255,0,0,1),
                0 0 60px rgba(255,0,0,0.8);
            margin-bottom: 30px;
            animation: pulse 2s infinite;
            font-weight: bold;
            letter-spacing: 3px;
        }

        /* Mesajlar - ortada */
        .message-text {
            max-width: 700px;
        }

        .message-text p {
            font-size: 1.6rem;
            color: #fff;
            line-height: 2;
            text-shadow: 
                3px 3px 6px rgba(0,0,0,0.9),
                0 0 20px rgba(0,0,0,0.8);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .heart-icon {
            font-size: 3rem;
            animation: heartbeat 1.5s infinite;
            display: inline-block;
            filter: drop-shadow(0 0 15px rgba(255, 0, 0, 1));
            margin: 5px 0;
        }

        .quote {
            margin-top: 25px;
            font-style: italic;
            font-size: 1.3rem !important;
            color: #ffd700 !important;
            text-shadow: 
                2px 2px 4px rgba(0,0,0,1),
                0 0 20px rgba(255, 215, 0, 0.6) !important;
        }

        /* Uçuşan kalpler */
        .floating-heart {
            position: fixed;
            font-size: 24px;
            animation: floatUp linear infinite;
            z-index: 5;
            pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.9));
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg) scale(1.3);
                opacity: 0;
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
            75% { transform: scale(1.3); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .message-text p { font-size: 1.2rem; }
            .quote { font-size: 1rem !important; }
            /* Mobilde daha fazla aşağı kaydır */
            .background-image {
                background-position: center 60%;
            }
        }
    </style>
</head>
<body>
    <!-- Arka plan - fotoğraf aşağı kaydırıldı -->
    <div class="background-image"></div>
    <div class="overlay"></div>

    <!-- Ana içerik -->
    <div class="container">
        <h1>Seni Seviyorum ❤️</h1>
        
        <div class="message-text">
            <p><span class="heart-icon">💖</span></p>
            <p>Gözlerin bir yıldızdan daha parlak,</p>
            <p>Gülüşün güneşi bile kıskandırır.</p>
            <p>Kalbimdeki tek sahib sensin,</p>
            <p>Sen benim her şeyimsin!</p>
            <p class="quote">
                "Seninle geçen her an, ömrüme ömür katıyor."
            </p>
            <p><span class="heart-icon">💖</span></p>
        </div>
    </div>

    <script>
        const heartEmojis = ['❤️', '💖', '💕', '💗', '💓', '💝', '💘', '💞'];
        
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 4 + 6) + 's';
            heart.style.fontSize = (Math.random() * 25 + 20) + 'px';
            heart.style.opacity = Math.random() * 0.4 + 0.6;
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 10000);
        }

        setInterval(createHeart, 250);

        for(let i = 0; i < 20; i++) {
            setTimeout(createHeart, i * 150);
        }
    </script>
</body>
</html>
